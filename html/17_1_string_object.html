    <script>
      // 1. slice 실무 활용 에제

      // 1-1 긴 텍스트를 "더보기" 처리
      const longString =
        "자바스크립트 실무 마스터: 기초에서 심화까지 한 번에 끝내기";
      const truncateTitle = (title, maxLength) => {
        if (title.length > maxLength) {
          return title.slice(0, maxLength) + "..." + "더보기";
        } else {
          return title;
        }
      };
      console.log(truncateTitle(longString, 10));

      // 1-2 전화 번호 뒷자리 ****로 마스킹 처리
      const phoneNumber1 = "010-1234-5678";
      const hiddenNumber = phoneNumber1.slice(0, -4) + "****";
      console.log(hiddenNumber);

      // 2. replace 실무 활용 예제 (with 정규식(regular expression))

      // 2-1 전화번호를 입력 받아 DB에 저장
      const phoneNumber2 = "010-1234-5678";
      let clearNumber = phoneNumber2.replace(/\D/g, "");
      let str = "Welcome Jeju!! Jeju!!";
      console.log(str.replace(/Jeju/g, "Seoul"));

      /* 정규식
        - / / 사이에 작성
        - \ 는 아니다를 의미함.
        - D 는 숫자를 의미함 : \D => 숫자가 아닌 것
        - option : g => 모두
      */

      // while (clearNumber.indexOf("-") > -1) {

      console.log(clearNumber);

      // 3. padStart 실무 활용 예제
      // 3-1 쇼핑 사이트에서 주문 번호나 회원번호를 생성하고 관리하기 편하도록
      let memberNumber = 234;
      const generateMemberNumber = (number, digit) => {
        return "MN-".concat(number.padStart(digit, "0"));
      };
      console.log(generateMemberNumber(String(memberNumber), 6)); // 8, 000234

      // 4. charAt 실무 활용 예제
      // 4-1 주민등록번호
      // 남 : 1(~1999), 3(2000~), 5(외국인) | 여자 : 2(~1999), 4(2000~), 6(외국인)
      const checkGender = (sn) => {
        // let answer = "";
        // let num = sn.charAt(7);
        // if (num % 2 == 0) {
        //   answer += "여성";
        //   switch (num) {
        //     case "6":
        //       answer = "외국인 " + answer;
        //       break;
        //     default:
        //       answer = "내국인 " + answer;
        //   }
        // } else {
        //   answer += "남성";
        //   switch (num) {
        //     case "5":
        //       answer = "외국인 " + answer;
        //       break;
        //     default:
        //       answer = "내국인 " + answer;
        //   }
        // }
        // return answer;
        return (
          (sn.charAt(7) >= 5 ? "외국인 " : "내국인 ") +
          (sn.charAt(7) % 2 == 0 ? "여성" : "남성")
        );
      };
      console.log(checkGender("091215-4057213"));

      // 5. split 실무 활용 예제
      // 5-1 url을 통해 특정 파라미터를 추출하기 (카테고리, 물품명);
      const url = "https://myshop.com/products/electronics/iphone15";
      const pageSegment = url.split("/");
      let size = pageSegment.length;
      // console.log(pageSegment);
      // 카테고리 출력
      console.log(pageSegment[size - 2]); // 기본적인 배열로 출력
      console.log(`카테고리 : pageSegment[size - 2]`); // 그대로 출력
      console.log(`카테고리 : ${pageSegment[size - 2]}`); // ${}를 사용하여 그 부분만 결과값
      //물품명 출력
      console.log(`제품명 : ${pageSegment[size - 1]}`);

      // 5-2 로그 파일을 통해 시간과 사용자 알아내기 (매우 중요!!!)
      const csvData =
        "2026-04-29,Login_Success,user_01\n2024-04-29,Login_Fail,user_02";
      const log = csvData.split("\n");
      for (let line of log) {
        [date, status, user] = line.split(","); // **배열 분할 할당 (ES6부터)**
        if (status === "Login_Success") {
          console.log(user, date);
          console.log(`${user}가 ${date}에 로그인에 성공했습니다.`);
        }
      }
      status.endsWith();

      // 6. endsWith 실무 활용 예제
      // 6-1 jpg, png만 업로드 가능
      const checkFileName = (fileName) => {
        fileName = fileName.toLowerCase();
        let arr = fileName.split(".");

        if (fileName.endsWith("jpg") || fileName.endsWith("png")) {
          return "업로드가 가능합니다.";
        } else {
          return `${arr[arr.length - 1]} 형식은 업로드가 불가능합니다.`; // "업로드 불가능합니다."
        }
      };

      console.log(checkFileName("my_photo.JPG"));
      console.log(checkFileName("my_photo.gif"));
