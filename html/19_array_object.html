    <select name="drinkType" id="drinkType"></select>

    <br />
    <button onclick="search1()">조회1(문자열)</button>
    <button onclick="search2()">조회2(push, join)</button>
    <table class="table1">

        <th>학번</th>

    <!--DB에서 불러올 데이터를 보여줄 테이블-->
    <table class="table1">
      <thead>
        <th>음료</th>
        <th>가격</th>
      </thead>
      <tbody id="tbody1"></tbody>
    </table>

    <script>
      // String, Array 등등... 이번 시험 범위
      // JS 실무에서 가장 많이 사용하는 객체 (**) => 배열(array)
      let brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];

      // 1. toString() : 쉼표를 기준으로 하나의 문자열로 변환
      console.log(brands.toString()); // 애플,구글,메타,삼성,아마존,마이크로소프트

      // 2. join() : 파라미터로 전달된 문자를 이용해서 하나의 문자열로 합치기
      // innerText, innerHTML의 차이점을 알게 해주는 것.
      console.log(brands.join("")); // 애플구글메타삼성아마존마이크로소프트
      console.log(brands.join("-")); // 애플-구글-메타-삼성-아마존-마이크로소프트

      // 2-1. += =    > DB에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // 장점 : 가독성 , 단점 : 성능 저하
      const search1 = () => {
        // 1. 데이터를 읽어오기
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        // 2. 데이터 수에 맞게 태그 생성
        let tagsStr = "";
        for (drink of drinkList) {
          tagsStr +=
            "<tr>" +
            "<td>" +
            drink.name +
            "</td>" +
            "<td>" +
            drink.price +
            "</td>" +
            "</tr>";
        }
        console.log(tagsStr);
        // 3. 태그 랜더링(innerHTML)해서 화면에 뿌리기
        document.getElementById("tbody1").innerHTML = tagsStr;
      };

      // 2-2. join() 실무 활용 예제 => DB에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // 장점 : 성능, 단점 : X
      const search2 = () => {
        // 1. 데이터를 읽어오기
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        // 2. 데이터 수에 맞게 태그 생성
        let tagsArray = [];
        for (drink of drinkList) {
          tagsArray.push(
            `<tr><td>${drink.name}</td><td>${drink.price}</td></tr>`,
          );
        }
        console.log(tagsArray);
        // 3. 태그 랜더링(innerHTML)해서 화면에 뿌리기
        document.getElementById("tbody1").innerHTML = tagsArray.join("");
      };

      // 3. pop() : 배열의 마지막 요소 삭제, 리턴: 마지막 요소
      brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
      console.log(brands.pop());
      console.log(brands);

      // 4. push() : 배열의 마지막 요소 추가, 리턴: 배열의 길이 (활용: + join())
      console.log(brands.push("테슬라"));
      console.log(brands);

      // 5. unshift() : 배열의 처음에 요소 추가, 리턴: 배열의 길이 (활용: + join())
      // 단점: 실무 활용도가 낮다. ((앞에 요소를 추가하면 배열을 뒤로 하나씩 땡겨야 하기에 성능이 좋지 않다.
      console.log(brands.unshift("하이닉스"));
      console.log(brands);

      // 5-1. unshift() 실무 활용 예제
      function loadDrinkList() {
        const types = [
          { text: "이온음료", code: "A" },
          { text: "커피", code: "B" },
          { text: "콜라", code: "C" },
        ];
        const tags = [];
        types.unshift({ text: "주스", code: "D" });
        for (type of types) {
          tags.push(
            "<option value= " + type.code + ">" + type.text + "</option>",
          );
        }
        return tags;
      }
      const tagsList = loadDrinkList();
      document.getElementById("drinkType").innerHTML = tagsList.join("");

      // 실습 - { text: "주스", code: "D" } 삽입
      // ㄴ> 그냥 함수 안에서 types에 unshift 해버림.

      // 6. shift() : 배열의 처음에 요소 삭제, 리턴: 처음 요소
    </script>
  </body>
