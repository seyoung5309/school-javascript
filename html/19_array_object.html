<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1" , width="100%">
      <tr>
        <th>학번</th>
        <th>이름</th>
      </tr>
      <tr>
        <td>2101</td>
        <td>강하윤</td>
      </tr>
      <tr>
        <td>2102</td>
        <td>김기범</td>
      </tr>
      <tr>
        <td>2103</td>
        <td>김진수</td>
      </tr>
    </table>

    <br />

    <table border="1" , width="100%">
      <thead>
        <th>학번</th>
        <th>이름</th>
      </thead>
      <tbody>
        <tr>
          <td>2101</td>
          <td>강하윤</td>
        </tr>
        <tr>
          <td>2102</td>
          <td>김기범</td>
        </tr>
        <tr>
          <td>2103</td>
          <td>김진수</td>
        </tr>
      </tbody>
    </table>

    <script>
      // String, Array 등등... 이번 시험 범위
      // JS 실무에서 가장 많이 사용하는 객체 (**) => 배열(array)
      let brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];

      // 1. toString() : 쉼표를 기준으로 하나의 문자열로 변환
      console.log(brands.toString()); // 애플,구글,메타,삼성,아마존,마이크로소프트

      // 2. join() : 파라미터로 전달된 문자를 이용해서 하나의 문자열로 합치기
      // innerText, innerHTML의 차이점을 알게 해주는 것.
      console.log(brands.join("")); // 애플구글메타삼성아마존마이크로소프트
      console.log(brands.join("-")); // 애플-구글-메타-삼성-아마존-마이크로소프트

      // 2-1. join() 실무 활용 예제 => DB에서 데이터를 읽어와 동적으로 표를 이용해서 출력
    </script>
  </body>
</html>
