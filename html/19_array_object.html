    <br />
    <button onclick="search1()">조회1(문자열)</button>
    <button onclick="search2()">조회2(push, join)</button>
    <table class="table1">
      <thead>
        <th>학번</th>
        <th>이름</th>
      </thead>
      <tbody>
        <tr>
          <td>2101</td>
          <td>강하윤</td>
        </tr>
        <tr>
          <td>2102</td>
          <td>김기범</td>
        </tr>
        <tr>
          <td>2103</td>
          <td>김진수</td>
        </tr>
        <tr>
          <td>2104</td>
          <td>사레 들린 토끼</td>
        </tr>
      </tbody>
    </table>

    <!--DB에서 불러올 데이터를 보여줄 테이블-->
    <table class="table1">
      <thead>
        <th>음료</th>
        <th>가격</th>
      </thead>
      <tbody id="tbody1"></tbody>
    </table>

    <script>
      // String, Array 등등... 이번 시험 범위
      // JS 실무에서 가장 많이 사용하는 객체 (**) => 배열(array)
      let brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];

      // 1. toString() : 쉼표를 기준으로 하나의 문자열로 변환
      console.log(brands.toString()); // 애플,구글,메타,삼성,아마존,마이크로소프트

      // 2. join() : 파라미터로 전달된 문자를 이용해서 하나의 문자열로 합치기
      // innerText, innerHTML의 차이점을 알게 해주는 것.
      console.log(brands.join("")); // 애플구글메타삼성아마존마이크로소프트
      console.log(brands.join("-")); // 애플-구글-메타-삼성-아마존-마이크로소프트

      // 2-1. += =    > DB에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // 장점 : 가독성 , 단점 : 성능 저하
      const search1 = () => {
        // 1. 데이터를 읽어오기
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        // 2. 데이터 수에 맞게 태그 생성
        let tagsStr = "";
        for (drink of drinkList) {
          tagsStr +=
            "<tr>" +
            "<td>" +
            drink.name +
            "</td>" +
            "<td>" +
            drink.price +
            "</td>" +
            "</tr>";
        }
        console.log(tagsStr);
        // 3. 태그 랜더링(innerHTML)해서 화면에 뿌리기
        document.getElementById("tbody1").innerHTML = tagsStr;
      };

      // 2-2. join() 실무 활용 예제 => DB에서 데이터를 읽어와 동적으로 표를 이용해서 출력
      // 장점 : , 단점 :
      const search2 = () => {
        // 1. 데이터를 읽어오기
        const drinkList = [
          { name: "오렌지", price: 1000 },
          { name: "파워에이드", price: 1200 },
          { name: "커피", price: 700 },
          { name: "보리음료", price: 1200 },
          { name: "코카콜라", price: 1800 },
        ];
        // 2. 데이터 수에 맞게 태그 생성
        let tagsArray = [];
        for (drink of drinkList) {
          tagsArray.push(
            `<tr><td>${drink.name}</td><td>${drink.price}</td></tr>`,
          );
        }
        let tagsStr = tagsArray.join("");
        console.log(tagsStr);
        // 3. 태그 랜더링(innerHTML)해서 화면에 뿌리기
        document.getElementById("tbody1").innerHTML = tagsStr;
      };
    </script>
  </body>
</html>
