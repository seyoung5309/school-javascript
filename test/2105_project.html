<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미림 카페 주문 관리</title>
    <style>
        button,
        select {
            cursor: pointer;
        }

        body {
            justify-self: center;
            width: 402px;
            height: 874px;
            font-family: Pretendard;
        }

        table {
            border: 1px solid black;
            width: 300px;
        }

        h1 {
            justify-self: center;
            background-color: #deedf8;
        }

        h2 {
            justify-self: center;
        }

        table {
            justify-self: center;
            width: 100%
        }

        td {
            border: 1px solid black;
        }

        th {
            border: 1px solid black;
            background-color: #deedf8;
        }

        hr {
            margin: 30px 0 30px 0;
        }

        .box0 {
            width: 100%;
            height: 45px;
            border-radius: 10px;
            border: 1px solid black;
            background: #FFF;
            padding-left: 10px;
        }

        .box1 {
            width: 307px;
            height: 45px;
            border-radius: 10px;
            border: 1px solid black;
            background: #FFF;
            padding-left: 10px;
        }

        .box2 {
            width: 75px;
            height: 45px;
            border-radius: 10px;
            border: 1px solid black;
            background: #FFF;
            background-color: #deedf8;
        }
    </style>
</head>

<body>
    <h1>미림 카페 주문 관리</h1>

    <hr>

    <section>
        <div>
            <h2>메뉴 선택</h2>
            <label>메뉴</label><br>
            <select id="menuSelect" class="box0"></select>
            <br>
            <label for="quantityInput">수량</label><br>
            <input id="quantityInput" type="number" class="box1" value="1" min="1" />
            <button onclick="addOrder()" class="box2">주문 추가</button>
        </div>

        <hr>

        <div>
            <h2>메뉴 검색</h2>
            <input id="searchInput" placeholder="메뉴명을 입력하세요." class="box1">
            <button onclick="searchMenu()" class="box2">검색</button>
            <br>
            <label id="searchResult">검색 결과가 여기에 표시됩니다.</label>
        </div>
    </section>

    <hr>

    <section>
        <h2>주문 내역</h2>
        <table>
            <thead>
                <tr>
                    <th>주문번호</th>
                    <th>메뉴명</th>
                    <th>단가</th>
                    <th>수량</th>
                    <th>금액</th>
                </tr>
            </thead>
            <tbody id="orderList">
                <tr>
                    <td colspan="5" style="text-align: center;">주문 내역이 없습니다.</td>
                </tr>
            </tbody>
        </table>
    </section>

    <hr>

    <section>
        <h2>결제 정보</h2>
        <label>총 주문 수량:</label>
        <label id="orderAll">0</label>
        <label>개</label>

        <br>

        <label>총 결제 금액</label>
        <label id="priceAll">0</label>
        <label>원</label>
    </section>

    <script>
        const menuList = [
            { name: "아메리카노", price: 3000, category: "coffee" },
            { name: "카페라떼", price: 4000, category: "coffee" },
            { name: "바닐라라떼", price: 4500, category: "coffee" },
            { name: "초코라떼", price: 4200, category: "nonCoffee" },
            { name: "레몬에이드", price: 5000, category: "ade" },
            { name: "자몽에이드", price: 5200, category: "ade" },
        ];

        const orderList = [];

        // 메뉴 불러오기
        const loadMenu = () => {
            const optionList = menuList.map(
                (menu, index) =>
                    `<option value="${index}">
                ${menu.name} (${menu.price}원)
            </option>`
            );

            document.getElementById("menuSelect").innerHTML =
                optionList.join("");
        };

        // 주문 추가
        const addOrder = () => {
            const menuIndex =
                document.getElementById("menuSelect").value;

            const quantity = Number(
                document.getElementById("quantityInput").value
            );

            if (!quantity || quantity < 1) {
                alert("수량을 1개 이상 입력하세요.");
                return;
            }

            const menu = menuList[menuIndex];

            const orderNo =
                "ORDER-" +
                String(orderList.length + 1).padStart(3, "0");

            const order = {
                orderNo: orderNo,
                name: menu.name,
                price: menu.price,
                quantity: quantity,
                total: menu.price * quantity,
            };

            orderList.push(order);

            renderOrderTable();
            updateTotalInfo();

            document.getElementById("quantityInput").value = 1;
        };

        // 주문 테이블 출력
        const renderOrderTable = () => {
            const tbody =
                document.getElementById("orderList");

            if (orderList.length === 0) {
                tbody.innerHTML = `
        <tr>
            <td colspan="5" style="text-align:center">
                주문 내역이 없습니다.
            </td>
        </tr>`;
                return;
            }

            const rows = orderList.map(
                (order) => `
        <tr>
            <td>${order.orderNo}</td>
            <td>${order.name}</td>
            <td>${order.price}</td>
            <td>${order.quantity}</td>
            <td>${order.total}</td>
        </tr>
    `
            );

            tbody.innerHTML = rows.join("");
        };

        // 총 수량, 총 금액 계산
        const updateTotalInfo = () => {
            const totalQuantity = orderList.reduce(
                (sum, order) => sum + order.quantity,
                0
            );

            const totalPrice = orderList.reduce(
                (sum, order) => sum + order.total,
                0
            );

            document.getElementById("orderAll").innerText =
                totalQuantity;

            document.getElementById("priceAll").innerText =
                totalPrice.toLocaleString();
        };

        // 메뉴 검색
        const searchMenu = () => {
            const keyword = document
                .getElementById("searchInput")
                .value.trim()
                .toLowerCase();

            if (keyword === "") {
                document.getElementById("searchResult").innerHTML =
                    "검색어를 입력하세요.";
                return;
            }

            const result = menuList.filter((menu) =>
                menu.name.toLowerCase().includes(keyword)
            );

            if (result.length === 0) {
                document.getElementById("searchResult").innerHTML =
                    "검색 결과가 없습니다.";
                return;
            }

            document.getElementById("searchResult").innerHTML =
                result
                    .map(
                        (menu) =>
                            `메뉴명 : ${menu.name} | 가격 : ${menu.price}원 | 카테고리 : ${menu.category}`
                    )
                    .join("<br>");
        };

        loadMenu();
    </script>
</body>

</html>
